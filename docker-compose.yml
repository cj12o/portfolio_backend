services:
  backend:
    container_name: portfolio_backend
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000"
    restart: unless-stopped
    env_file:
      - .env
  nginx:
    image: nginx:latest
    container_name: portfolio_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend